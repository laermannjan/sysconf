---
- hosts: localhost
  vars_prompt:
    # instead of -K/--ask-become-pass: geerlingguy.mac.homebrew uses this as
    # become password and passes it to sudo_password for cask post-install scripts
    - name: ansible_become_password
      prompt: sudo password
      private: yes

  roles:
    - {role: ssh, tags: ['ssh']}
    - {role: system, tags: ['system']}
    - {role: dotfiles, tags: ['dotfiles']}
    - {role: shell, tags: ['shell']}
    - {role: packages, tags: ['packages']}
    - {role: fonts, tags: ['fonts']}

  post_tasks:
    - name: Copy public key to clipboard
      shell: "{{ 'pbcopy' if ansible_os_family == 'Darwin' else 'xclip -selection clipboard' }} < ~/.ssh/id_ed25519.pub"
      when: ssh_key is defined and not ssh_key.stat.exists
      tags: [ssh]

    - name: Open forge SSH key pages
      command: "{{ 'open' if ansible_os_family == 'Darwin' else 'xdg-open' }} {{ item }}"
      loop:
        - https://github.com/settings/ssh/new
        - https://gitlab.com/-/user_settings/ssh_keys
        - https://codeberg.org/user/settings/keys
      when: ssh_key is defined and not ssh_key.stat.exists
      tags: [ssh]

    - name: Wait for user to add SSH key to forges
      pause:
        prompt: "Public key copied to clipboard. Add it to each forge, then press Enter"
      when: ssh_key is defined and not ssh_key.stat.exists
      tags: [ssh]
