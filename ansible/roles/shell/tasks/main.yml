---
- name: Install fish
  become: "{{ ansible_facts['pkg_mgr'] != 'homebrew' }}"
  package:
    name:
      - fish
      - curl

- name: Get the fish binary path
  # PATH includes macOS Homebrew prefixes (arm + intel) but NOT linuxbrew.
  # On Linux we want distro fish (/usr/bin/fish) as login shell; linuxbrew's
  # fish gets pulled in as a fisher dep but isn't suitable for /etc/shells.
  shell: command -v fish
  register: fish_path
  changed_when: false
  become: false
  environment:
    PATH: "/opt/homebrew/bin:/usr/local/bin:{{ ansible_facts['env'].PATH }}"

- name: Add fish to /etc/shells
  become: true
  lineinfile:
    path: /etc/shells
    line: "{{ fish_path.stdout }}"

- name: Set fish as default shell
  become: true
  user:
    name: "{{ ansible_facts['user_id'] }}"
    shell: "{{ fish_path.stdout }}"


