---
- include_tasks: "{{ ansible_facts['os_family'] | lower }}.yml"
  when: ansible_facts['os_family'] | lower in ['debian', 'redhat']

- name: Run brew bundle
  ansible.builtin.command:
    cmd: brew bundle install --file {{ brewfile }}
  vars:
    brewfile: "{{ lookup('env', 'XDG_CONFIG_HOME') | default(ansible_facts['env'].HOME + '/.config', true) }}/homebrew/Brewfile"
  environment:
    PATH: "/opt/homebrew/bin:/home/linuxbrew/.linuxbrew/bin:{{ ansible_facts['env'].PATH }}"
    HOMEBREW_NO_ANALYTICS: "1"
  register: brew_bundle
  changed_when: "'Installing' in brew_bundle.stdout or 'Upgrading' in brew_bundle.stdout"
  # Continue playbook on failure (commonly arch-unavailable flatpaks).
  ignore_errors: true
  tags:
    - tools

- name: Report brew bundle failures
  ansible.builtin.debug:
    msg:
      - "brew bundle exited {{ brew_bundle.rc }} - playbook continued"
      - "Failure-related lines (Installing X followed by Error/Failed = that package):"
      - "{{ (brew_bundle.stdout_lines + brew_bundle.stderr_lines) | select('search', '(Installing|Error|Failed|not installed|No remote refs|Nothing matches)') | list }}"
  when: brew_bundle.failed | default(false)
  tags:
    - tools

