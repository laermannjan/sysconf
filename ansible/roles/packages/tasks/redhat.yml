---
- name: Import 1Password RPM GPG key
  ansible.builtin.rpm_key:
    key: https://downloads.1password.com/linux/keys/1password.asc
    state: present
  become: true

- name: Add 1Password RPM repository to DNF
  ansible.builtin.yum_repository:
    name: "1password"
    description: "1Password Stable Channel"
    baseurl: "https://downloads.1password.com/linux/rpm/stable/$basearch"
    gpgcheck: yes
    gpgkey: "https://downloads.1password.com/linux/keys/1password.asc"
    enabled: yes
  become: true

- name: install {{ packages | sort | join(', ')}}
  become: true
  vars:
    packages:
      - "@Development Tools"
      - "@Multimedia"
      - 1password
      - 1password-cli
      - postgresql
      - procps-ng
  package:
    name: "{{ packages }}"

- name: Install zed
  ansible.builtin.shell: curl -fsSL https://zed.dev/install.sh | sh
  args:
    creates: "{{ ansible_facts['env'].HOME }}/.local/bin/zed"

- block:
    - name: Add Tailscale repository
      ansible.builtin.get_url:
        url: https://pkgs.tailscale.com/stable/fedora/tailscale.repo
        dest: /etc/yum.repos.d/tailscale.repo

    - name: Install Tailscale
      ansible.builtin.package:
        name: tailscale
        state: present
  become: true
  when: "'WSL2' not in ansible_facts['kernel']"

- name: Install docker engine
  ansible.builtin.shell: curl -fsSL https://get.docker.com | sh
  args:
    creates: /usr/bin/docker
  become: true

- name: Add user to docker group
  ansible.builtin.user:
    name: "{{ ansible_facts['user_id'] }}"
    groups: docker
    append: true
  become: true

- name: Install flatpak
  become: true
  ansible.builtin.package:
    name: flatpak
    state: present
  when: "'WSL2' not in ansible_facts['kernel']"

- name: Add flathub remote
  community.general.flatpak_remote:
    name: flathub
    flatpakrepo_url: https://dl.flathub.org/repo/flathub.flatpakrepo
    state: present
    method: user
  when: "'WSL2' not in ansible_facts['kernel']"
