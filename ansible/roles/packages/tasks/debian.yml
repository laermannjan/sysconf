---
- block:
    - name: Add WezTerm GPG key
      ansible.builtin.get_url:
        url: https://apt.fury.io/wez/gpg.key
        dest: /etc/apt/keyrings/wezterm-fury.gpg
        mode: "0644"

    - name: Add WezTerm repository
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/wezterm-fury.gpg] https://apt.fury.io/wez/ * *"
        state: present
  become: true

- name: Update apt cache
  become: true
  apt:
    update_cache: yes

- name: Install {{ packages | sort | join(', ')}}
  become: true
  vars:
    packages:
      - build-essential
      - man-db
      - procps
      - postgres-client
  package:
    name: "{{ packages }}"

- block:
    - name: Add 1Password GPG key
      ansible.builtin.get_url:
        url: https://downloads.1password.com/linux/keys/1password.asc
        dest: /etc/apt/keyrings/1password-archive-keyring.asc

    - name: Add 1Password repository
      ansible.builtin.apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/1password-archive-keyring.asc] https://downloads.1password.com/linux/debian/amd64 stable main"
        state: present

    - name: Install 1Password
      ansible.builtin.apt:
        name:
          - 1password
          - 1password-cli
        state: present
        update_cache: true
  become: true
  when: ansible_architecture == "x86_64"
