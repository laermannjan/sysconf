---
- name: Ensure ~/.ssh exists
  file:
    path: "~/.ssh"
    mode: "0700"
    state: directory

- name: Check if SSH key exists
  stat:
    path: ~/.ssh/id_ed25519
  register: ssh_key

- name: Prompt for SSH key passphrase
  pause:
    prompt: "Enter passphrase for new SSH key"
    echo: false
  register: ssh_passphrase
  when: not ssh_key.stat.exists

- name: Generate SSH keypair
  community.crypto.openssh_keypair:
    path: "{{ ansible_facts.env.HOME }}/.ssh/id_ed25519"
    type: ed25519
    comment: "{{ ansible_facts.user_id }}@{{ ansible_facts.hostname }}"
    passphrase: "{{ ssh_passphrase.user_input }}"
    state: present
    register: my_ssh_key

- name: Deploy SSH config
  copy:
    src: config
    dest: "~/.ssh/config"
    mode: "0400"
