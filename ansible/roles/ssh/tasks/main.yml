---
- name: Ensure ~/.ssh exists
  file:
    path: "~/.ssh"
    mode: '0700'
    state: directory

# --- Key generation (only on first run) ---

- name: Check if SSH key exists
  stat:
    path: ~/.ssh/id_ed25519
  register: ssh_key

- name: Prompt for SSH key passphrase
  pause:
    prompt: "Enter passphrase for new SSH key"
    echo: false
  register: ssh_passphrase
  when: not ssh_key.stat.exists

- name: Generate SSH keypair
  command: >-
    ssh-keygen -t ed25519
    -C "{{ ansible_user_id }}@{{ ansible_hostname }}"
    -f {{ ansible_env.HOME }}/.ssh/id_ed25519
    -N "{{ ssh_passphrase.user_input }}"
  when: not ssh_key.stat.exists

# --- SSH config deployment ---

- name: Deploy SSH config
  copy:
    src: config.vault
    dest: "~/.ssh/config"
    mode: "0400"

# --- Read public key for forge upload ---

- name: Read public key
  slurp:
    src: ~/.ssh/id_ed25519.pub
  register: ssh_pub_key

- name: Load forge tokens
  include_vars:
    file: "{{ playbook_dir }}/roles/ssh/files/forge_tokens.vault"

# --- GitHub key upload ---

- name: List GitHub SSH keys
  uri:
    url: https://api.github.com/user/keys
    method: GET
    headers:
      Authorization: "token {{ github_token }}"
      Accept: application/vnd.github+json
    return_content: yes
  register: github_keys
  ignore_errors: true

- name: Find existing GitHub key with matching title
  set_fact:
    github_existing_key: "{{ github_keys.json | default([]) | selectattr('title', 'equalto', ansible_hostname) | list | first | default(None) }}"
  when: github_keys is succeeded

- name: Delete stale GitHub key
  uri:
    url: "https://api.github.com/user/keys/{{ github_existing_key.id }}"
    method: DELETE
    headers:
      Authorization: "token {{ github_token }}"
      Accept: application/vnd.github+json
    status_code: 204
  when:
    - github_keys is succeeded
    - github_existing_key is not none
    - github_existing_key.key != (ssh_pub_key.content | b64decode | trim | regex_replace(' [^ ]+$', ''))
  ignore_errors: true

- name: Upload SSH key to GitHub
  uri:
    url: https://api.github.com/user/keys
    method: POST
    headers:
      Authorization: "token {{ github_token }}"
      Accept: application/vnd.github+json
    body_format: json
    body:
      title: "{{ ansible_hostname }}"
      key: "{{ ssh_pub_key.content | b64decode | trim }}"
    status_code: 201
  when:
    - github_keys is succeeded
    - github_existing_key is none or (github_existing_key is not none and github_existing_key.key != (ssh_pub_key.content | b64decode | trim | regex_replace(' [^ ]+$', '')))
  ignore_errors: true

# --- GitLab key upload ---

- name: List GitLab SSH keys
  uri:
    url: https://gitlab.com/api/v4/user/keys
    method: GET
    headers:
      PRIVATE-TOKEN: "{{ gitlab_token }}"
    return_content: yes
  register: gitlab_keys
  ignore_errors: true

- name: Find existing GitLab key with matching title
  set_fact:
    gitlab_existing_key: "{{ gitlab_keys.json | default([]) | selectattr('title', 'equalto', ansible_hostname) | list | first | default(None) }}"
  when: gitlab_keys is succeeded

- name: Delete stale GitLab key
  uri:
    url: "https://gitlab.com/api/v4/user/keys/{{ gitlab_existing_key.id }}"
    method: DELETE
    headers:
      PRIVATE-TOKEN: "{{ gitlab_token }}"
    status_code: 204
  when:
    - gitlab_keys is succeeded
    - gitlab_existing_key is not none
    - gitlab_existing_key.key != (ssh_pub_key.content | b64decode | trim | regex_replace(' [^ ]+$', ''))
  ignore_errors: true

- name: Upload SSH key to GitLab
  uri:
    url: https://gitlab.com/api/v4/user/keys
    method: POST
    headers:
      PRIVATE-TOKEN: "{{ gitlab_token }}"
    body_format: json
    body:
      title: "{{ ansible_hostname }}"
      key: "{{ ssh_pub_key.content | b64decode | trim }}"
    status_code: 201
  when:
    - gitlab_keys is succeeded
    - gitlab_existing_key is none or (gitlab_existing_key is not none and gitlab_existing_key.key != (ssh_pub_key.content | b64decode | trim | regex_replace(' [^ ]+$', '')))
  ignore_errors: true

# --- Codeberg key upload ---

- name: List Codeberg SSH keys
  uri:
    url: https://codeberg.org/api/v1/user/keys
    method: GET
    headers:
      Authorization: "token {{ codeberg_token }}"
    return_content: yes
  register: codeberg_keys
  ignore_errors: true

- name: Find existing Codeberg key with matching title
  set_fact:
    codeberg_existing_key: "{{ codeberg_keys.json | default([]) | selectattr('title', 'equalto', ansible_hostname) | list | first | default(None) }}"
  when: codeberg_keys is succeeded

- name: Delete stale Codeberg key
  uri:
    url: "https://codeberg.org/api/v1/user/keys/{{ codeberg_existing_key.id }}"
    method: DELETE
    headers:
      Authorization: "token {{ codeberg_token }}"
    status_code: 204
  when:
    - codeberg_keys is succeeded
    - codeberg_existing_key is not none
    - codeberg_existing_key.key != (ssh_pub_key.content | b64decode | trim | regex_replace(' [^ ]+$', ''))
  ignore_errors: true

- name: Upload SSH key to Codeberg
  uri:
    url: https://codeberg.org/api/v1/user/keys
    method: POST
    headers:
      Authorization: "token {{ codeberg_token }}"
    body_format: json
    body:
      title: "{{ ansible_hostname }}"
      key: "{{ ssh_pub_key.content | b64decode | trim }}"
    status_code: 201
  when:
    - codeberg_keys is succeeded
    - codeberg_existing_key is none or (codeberg_existing_key is not none and codeberg_existing_key.key != (ssh_pub_key.content | b64decode | trim | regex_replace(' [^ ]+$', '')))
  ignore_errors: true

# --- Legacy cleanup ---

- name: Remove legacy per-identity SSH keys
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - ~/.ssh/id_ed25519.personal
    - ~/.ssh/id_ed25519.personal.pub
    - ~/.ssh/id_ed25519.alcemy
    - ~/.ssh/id_ed25519.alcemy.pub
