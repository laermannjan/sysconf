---
- name: Ensure ~/.ssh exists
  file:
    path: "~/.ssh"
    mode: '0700'
    state: directory

# --- Key generation (only on first run) ---

- name: Check if SSH key exists
  stat:
    path: ~/.ssh/id_ed25519
  register: ssh_key

- name: Prompt for SSH key passphrase
  pause:
    prompt: "Enter passphrase for new SSH key"
    echo: false
  register: ssh_passphrase
  when: not ssh_key.stat.exists

- name: Generate SSH keypair
  command: >-
    ssh-keygen -t ed25519
    -C "{{ ansible_user_id }}@{{ ansible_hostname }}"
    -f {{ ansible_env.HOME }}/.ssh/id_ed25519
    -N "{{ ssh_passphrase.user_input }}"
  when: not ssh_key.stat.exists

# --- SSH config deployment ---

- name: Deploy SSH config
  copy:
    src: config.vault
    dest: "~/.ssh/config"
    mode: "0400"

# --- Legacy cleanup ---

- name: Remove legacy per-identity SSH keys
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - ~/.ssh/id_ed25519.personal
    - ~/.ssh/id_ed25519.personal.pub
    - ~/.ssh/id_ed25519.alcemy
    - ~/.ssh/id_ed25519.alcemy.pub
