---

- name: Ensure {{ font_dir }} exists
  file:
    path: "{{ font_dir }}"
    state: directory

- name: Pull LFS font archive
  command: git lfs pull --include="roles/fonts/files/*"
  args:
    chdir: "{{ playbook_dir }}"

- name: fonts
  unarchive:
    src: "{{ playbook_dir }}/roles/fonts/files/fonts.tar.xz.vault"
    dest: "{{ font_dir }}"
    decrypt: yes
    mode: '0644'

- name: udpate font cache
  command: fc-cache -vf
  when: ansible_os_family != 'Darwin'
