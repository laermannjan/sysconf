---
name: Integration

on:
  push:
    branches: [main]
    paths: ["**/*.sh", config/**, .github/workflows/integration.yml]
  pull_request:
    paths: ["**/*.sh", config/**, .github/workflows/integration.yml]

env:
  NONINTERACTIVE: "1"

jobs:
  test-ubuntu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: First run
        run: SYSCONF_DIR="$GITHUB_WORKSPACE" bash sysconf.sh
      - name: Second run (idempotency)
        run: SYSCONF_DIR="$GITHUB_WORKSPACE" bash sysconf.sh

  test-fedora:
    runs-on: ubuntu-latest
    container:
      image: fedora:latest
    steps:
      - uses: actions/checkout@v4
      - name: Install sudo (not in base container)
        run: dnf install -y sudo
      - name: First run
        run: SYSCONF_DIR="$GITHUB_WORKSPACE" bash sysconf.sh
      - name: Second run (idempotency)
        run: SYSCONF_DIR="$GITHUB_WORKSPACE" bash sysconf.sh

  test-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: First run
        run: SYSCONF_DIR="$GITHUB_WORKSPACE" bash sysconf.sh
      - name: Second run (idempotency)
        run: SYSCONF_DIR="$GITHUB_WORKSPACE" bash sysconf.sh
